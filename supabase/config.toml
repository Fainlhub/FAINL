# These functions are called directly from the browser with only the anon key
# (no per-user session). verify_jwt must stay false, otherwise Supabase's gateway
# rejects the browser's automatic CORS preflight (OPTIONS) before it ever reaches
# our own corsHeaders handling in index.ts, causing:
#   "Response to preflight request doesn't pass access control check:
#    It does not have HTTP ok status."
[functions.ai-proxy]
verify_jwt = false

[functions.create-payment]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.news-ingest]
verify_jwt = false

[functions.news-generate]
verify_jwt = false
